<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR Hologramme 3D</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: black; }

    /* Scanlines hologramme */
    #holo-overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 10;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0,255,200,0.03) 3px, rgba(0,255,200,0.03) 4px
      );
    }

    /* Vignette bords */
    #vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 9;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,20,15,0.6) 100%);
    }

    #ui {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(0,255,200,0.8); font-family: monospace; font-size: 12px;
      text-align: center; z-index: 20; letter-spacing: 2px;
      text-shadow: 0 0 8px rgba(0,255,200,0.6);
    }
  </style>
</head>
<body>
  <div id="holo-overlay"></div>
  <div id="vignette"></div>
  <div id="ui">⬡ POINTEZ VERS LE MARKER ⬡</div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true;"
    vr-mode-ui="enabled: false"
  >
    <a-assets>
      <img id="portrait" src="photo.png" crossorigin="anonymous">
    </a-assets>

    <a-marker preset="hiro">

      <!-- Podium sol -->
      <a-cylinder
        position="0 0.02 0"
        radius="0.9" height="0.04"
        color="#001a1a" opacity="0.7"
        material="transparent: true"
      ></a-cylinder>

      <!-- Anneau rotatif extérieur -->
      <a-torus position="0 0.04 0" rotation="-90 0 0"
        radius="0.85" radius-tubular="0.012"
        color="#00ffcc" opacity="0.6"
        animation="property: rotation; from: -90 0 0; to: -90 360 0; dur: 7000; easing: linear; loop: true">
      </a-torus>

      <!-- Anneau intérieur sens inverse -->
      <a-torus position="0 0.04 0" rotation="-90 0 0"
        radius="0.6" radius-tubular="0.008"
        color="#0088ff" opacity="0.4"
        animation="property: rotation; from: -90 360 0; to: -90 0 0; dur: 4500; easing: linear; loop: true">
      </a-torus>

      <!-- Halo sol pulsant -->
      <a-circle position="0 0.03 0" rotation="-90 0 0"
        radius="0.75" color="#00ffcc" opacity="0.08"
        material="transparent: true"
        animation="property: scale; from: 1 1 1; to: 1.08 1.08 1; dur: 2500; easing: easeInOutSine; loop: true; dir: alternate">
      </a-circle>

      <!-- === COUCHE 1 : fond / arrière-plan (plaque sculptée) === -->
      <!-- Position Z négative = en arrière -->
      <a-image
        src="#portrait"
        position="0 1.4 -0.18"
        width="1.15" height="1.55"
        material="transparent: true; alphaTest: 0.05; opacity: 0.4; shader: flat"
        animation__float="property: position; from: 0 1.35 -0.18; to: 0 1.45 -0.18; dur: 3800; easing: easeInOutSine; loop: true; dir: alternate"
        animation__sway="property: rotation; from: 0 -3 0; to: 0 3 0; dur: 5000; easing: easeInOutSine; loop: true; dir: alternate"
      ></a-image>

      <!-- === COUCHE 2 : milieu (corps) === -->
      <a-image
        src="#portrait"
        position="0 1.4 -0.06"
        width="1.1" height="1.5"
        material="transparent: true; alphaTest: 0.1; opacity: 0.7; shader: flat"
        animation__float="property: position; from: 0 1.38 -0.06; to: 0 1.48 -0.06; dur: 3400; easing: easeInOutSine; loop: true; dir: alternate"
        animation__sway="property: rotation; from: 0 -5 0; to: 0 5 0; dur: 5000; easing: easeInOutSine; loop: true; dir: alternate"
      ></a-image>

      <!-- === COUCHE 3 : avant-plan (visages, net et lumineux) === -->
      <a-image
        src="#portrait"
        position="0 1.4 0.09"
        width="1.05" height="1.45"
        material="transparent: true; alphaTest: 0.15; opacity: 1.0; shader: flat"
        animation__float="property: position; from: 0 1.38 0.09; to: 0 1.5 0.09; dur: 3000; easing: easeInOutSine; loop: true; dir: alternate"
        animation__sway="property: rotation; from: 0 -7 0; to: 0 7 0; dur: 5000; easing: easeInOutSine; loop: true; dir: alternate"
      ></a-image>

      <!-- Halo derrière portrait -->
      <a-circle
        position="0 1.4 -0.2"
        radius="0.65" color="#00ffcc" opacity="0.06"
        material="transparent: true"
        animation="property: scale; from: 1 1 1; to: 1.06 1.06 1; dur: 2000; easing: easeInOutSine; loop: true; dir: alternate">
      </a-circle>

      <!-- Particules verticales gauche -->
      <a-cylinder position="-0.5 0.6 0" radius="0.008" height="1.2"
        color="#00ffcc" opacity="0.25"
        animation="property: position; from: -0.5 0.4 0; to: -0.5 0.9 0; dur: 2000; easing: easeInOutSine; loop: true; dir: alternate">
      </a-cylinder>

      <!-- Particules verticales droite -->
      <a-cylinder position="0.5 0.6 0" radius="0.008" height="1.2"
        color="#00ffcc" opacity="0.25"
        animation="property: position; from: 0.5 0.9 0; to: 0.5 0.4 0; dur: 2400; easing: easeInOutSine; loop: true; dir: alternate">
      </a-cylinder>

      <!-- Texte bas -->
      <a-text
        value="FAMILLE"
        position="0 -0.25 0"
        rotation="-90 0 0"
        align="center"
        color="#00ffcc"
        width="2.5"
        opacity="0.7"
      ></a-text>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

</body>
</html>
