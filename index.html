<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR Hologramme</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: black; }

    /* Overlay hologramme scanline + teinte cyan */
    #holo-overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 10;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,255,200,0.03) 3px,
        rgba(0,255,200,0.03) 4px
      );
    }

    /* Cadre UI */
    #ui {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(0,255,200,0.8); font-family: monospace; font-size: 13px;
      text-align: center; z-index: 20; letter-spacing: 2px;
      text-shadow: 0 0 8px rgba(0,255,200,0.6);
    }
  </style>
</head>
<body>
  <div id="holo-overlay"></div>
  <div id="ui">⬡ POINTEZ LA CAMÉRA VERS LE MARKER ⬡</div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    renderer="logarithmicDepthBuffer: true; antialias: true;"
    vr-mode-ui="enabled: false"
  >
    <!-- Marker AR — utilise le marker HIRO par défaut (à graver) -->
    <a-marker preset="hiro">

      <!-- 1. Plan de base lumineux sous la photo (effet "podium hologramme") -->
      <a-plane
        position="0 0.01 0"
        rotation="-90 0 0"
        width="1.6" height="1.6"
        color="#003333"
        opacity="0.5"
        material="transparent: true"
      ></a-plane>

      <!-- 2. Grille hexagonale au sol (déco hologramme) -->
      <a-plane
        position="0 0.02 0"
        rotation="-90 0 0"
        width="1.6" height="1.6"
        src="#grid-tex"
        opacity="0.3"
        material="transparent: true"
      ></a-plane>

      <!-- 3. Photo portrait — REMPLACE ta-photo.jpg par ton image -->
      <a-image
        id="portrait"
        src="ta-photo.jpg"
        position="0 1.2 0"
        width="1.0"
        height="1.4"
        material="transparent: true; alphaTest: 0.1; shader: flat"
        animation="property: rotation; from: 0 -8 0; to: 0 8 0; dur: 4000; easing: easeInOutSine; loop: true; dir: alternate"
      ></a-image>

      <!-- 4. Halo lumineux derrière la photo -->
      <a-circle
        position="0 1.2 -0.05"
        radius="0.7"
        color="#00ffcc"
        opacity="0.08"
        material="transparent: true"
        animation="property: scale; from: 1 1 1; to: 1.05 1.05 1.05; dur: 2000; easing: easeInOutSine; loop: true; dir: alternate"
      ></a-circle>

      <!-- 5. Anneau rotatif bas (effet tech) -->
      <a-torus
        position="0 0.05 0"
        rotation="-90 0 0"
        radius="0.7"
        radius-tubular="0.01"
        color="#00ffcc"
        opacity="0.5"
        animation="property: rotation; from: -90 0 0; to: -90 360 0; dur: 6000; easing: linear; loop: true"
      ></a-torus>

      <!-- 6. Anneau plus petit, vitesse opposée -->
      <a-torus
        position="0 0.05 0"
        rotation="-90 0 0"
        radius="0.5"
        radius-tubular="0.008"
        color="#0099ff"
        opacity="0.35"
        animation="property: rotation; from: -90 360 0; to: -90 0 0; dur: 4000; easing: linear; loop: true"
      ></a-torus>

      <!-- 7. Lignes verticales montantes (particules hologramme) -->
      <a-cylinder position="-0.4 0.5 0" radius="0.01" height="1" color="#00ffcc" opacity="0.2"
        animation="property: position; from: -0.4 0.3 0; to: -0.4 0.8 0; dur: 1800; easing: easeInOutSine; loop: true; dir: alternate"></a-cylinder>
      <a-cylinder position="0.4 0.5 0" radius="0.01" height="1" color="#00ffcc" opacity="0.2"
        animation="property: position; from: 0.4 0.8 0; to: 0.4 0.3 0; dur: 2200; easing: easeInOutSine; loop: true; dir: alternate"></a-cylinder>

      <!-- 8. Texte nom (optionnel, personnalise) -->
      <a-text
        value="VOTRE NOM"
        position="0 -0.3 0"
        rotation="-90 0 0"
        align="center"
        color="#00ffcc"
        width="2"
        font="monoid"
      ></a-text>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

</body>
</html>
